# CN 一级厂商多为开源权重模型：最可靠的「倒序新闻面」是 HuggingFace 组织页
# （sort=created，新权重第一现场）+ GitHub 组织页（sort=updated）。官方产品/文档
# 首页（如 bigmodel introduction、kimi 聊天首页）不是新闻面，empty 不代表无发布——
# 详见 SKILL.md「成功」判定：非 feed 面命中空必须继续下穿。URL 于 2026-06-17 核实可达；
# .cn 源仍标 verify_before_use（Layer-0 失败时容错降级、不报警，需定期人工巡检）。
