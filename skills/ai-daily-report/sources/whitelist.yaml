# AI 日报 信源白名单
#
# 统一格式 fetch_chain：{name, category, weight, authority_tier, fetch_chain:[]}
#   - authority_tier: 1=官方/一级权威，2=主流科技媒体，3=Substack/个人博客
#   - fetch_chain 是有序列表，runner 从上到下逐层尝试，首次「成功且非伪成功」即停。
#   - layer types：
#     * webfetch          {url}              confidence 不变
#     * github_releases   {repo, path?}      confidence 不变
#     * websearch_scoped  {queries: []}      confidence 降一档（high→medium）
#     * websearch_broad   {queries: []}      confidence 强制 medium + via_broad_search 标记
#   - queries 占位符：{date}、{yesterday}、{week_range}
#   - 「成功」判定：HTTP 200 且页面体感为真实内容（非纯 CSS 模板 / 空骨架 / 登录墙）。
#     窗口内 0 条目（empty_in_window）：仅当命中层是「倒序新闻/发布 feed 面」（官方
#     news/blog 列表、release notes、GitHub releases、GitHub 组织 ?sort=updated、
#     HuggingFace 组织 ?sort=created），或源标了 empty_is_conclusive: true 时，才算
#     合法成功并停止；静态/产品/文档/聚合面（产品首页、API 介绍页、聊天入口、JS 壳）
#     命中空必须继续下穿后续 HF/GitHub 倒序面与 websearch。cn_labs / hard_data 默认
#     按「必须下穿」处理。详见 SKILL.md 日报步骤 1「成功」判定。
#   - verify_before_use: true 表示该源 Layer 0 入口尚未被人工 verify 过，跑日报时
#     首层若失败应直接落入 Layer 1+，不报警；近期需要做一次性人工巡检。
#   - 对 OpenAI / OpenAI Codex：若 Layer 0 命中 `403`、Cloudflare、JS shell 或空骨架，
#     只能记为“官方入口异常”，不得直接判空；必须沿同实体做一跳同域补证，
#     例如 news index / product / docs / RSS / sitemap，再决定是否为空。

source_families:
  official_release_surface:
    description: 官方发布页、一级公告页与产品发布入口
    fallback_policy: same_entity_one_hop
  official_changelog_surface:
    description: 官方 changelog、release notes 与 GitHub Releases
    fallback_policy: same_entity_one_hop
  official_product_blog_surface:
    description: 官方博客、news/blog 索引与产品博客
    fallback_policy: same_entity_one_hop
  hard_data_surface:
    description: 榜单、benchmark、pricing 与趋势硬数据入口
    fallback_policy: same_entity_one_hop
  broad_discovery_surface:
    description: 广义搜索、媒体发现面与社区高信号入口
    fallback_policy: same_entity_one_hop

